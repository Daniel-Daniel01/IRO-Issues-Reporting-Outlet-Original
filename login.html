<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | IRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="brand"><i class="fa-solid fa-bullhorn"></i> IRO</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline">Login</a>
      <a href="register.html" class="btn btn-primary">Register</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="icon-badge"><i class="fa-solid fa-right-to-bracket"></i></div>
    <h2>Welcome back</h2>
    <p>Log in to track and manage your reports.</p>

    <form class="validate-form" id="loginForm" data-redirect="dashboard.html" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
        <div class="form-error">Please enter your email</div>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password">
        <div class="form-error">Please enter your password</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>

    <div class="auth-footer-link">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
