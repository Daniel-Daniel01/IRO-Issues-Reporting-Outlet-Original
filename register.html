<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | IRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="brand"><i class="fa-solid fa-bullhorn"></i> IRO</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#contact">Contact</a>
    </nav>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline">Login</a>
      <a href="register.html" class="btn btn-primary">Register</a>
    </div>
    <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="icon-badge"><i class="fa-solid fa-user-plus"></i></div>
    <h2>Create your account</h2>
    <p>Join IRO to start reporting issues in your community.</p>

    <form class="validate-form" data-redirect="login.html" novalidate>
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required placeholder="e.g. Daniel Okafor">
        <div class="form-error">Please enter your full name</div>
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" required placeholder="you@example.com">
        <div class="form-error">Please enter a valid email</div>
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required placeholder="080X XXX XXXX">
        <div class="form-error">Please enter your phone number</div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Create a password">
        <div class="form-error">Please create a password</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="Re-enter your password">
        <div class="form-error">Passwords do not match</div>
      </div>
      <div class="form-group">
        <label>User Type</label>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="userType" value="student" checked> Student</label>
          <label class="radio-option"><input type="radio" name="userType" value="indigene"> Indigene</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>

    <div class="auth-footer-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
